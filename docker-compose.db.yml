services:
  db:
    image: postgres:18-alpine
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lorem
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - lorem-volume:/var/lib/postgresql
  dbeaver:
    image: dbeaver/cloudbeaver:25.3.4
    container_name: dbeaver
    restart: always
    ports:
      - "9090:8978"
    volumes:
      - dbeaver-data:/opt/dbeaver/data

volumes:
  lorem-volume:
  dbeaver-data: